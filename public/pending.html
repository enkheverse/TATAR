<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TATAR — Pending Approval</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="pending-wrap">
  <div class="pending-card">
    <div class="pending-icon">⏳</div>
    <h1>Application Received!</h1>
    <p>Your tatar account is pending admin approval. You'll be able to start taking orders once approved.</p>
    <p style="margin-top:1rem;font-size:13px;">Enter your phone number below, then message <b style="color:var(--accent);">@Tatarselch_bot</b> on Telegram — tap the <b>Share Contact</b> button it sends you. That's it!</p>
    <div style="margin-top:1.2rem;text-align:left;">
      <label style="font-size:13px;color:var(--muted);">Phone Number</label>
      <div style="display:flex;gap:8px;margin-top:6px;">
        <input id="tg-phone" type="tel" placeholder="+976 9999 9999" style="flex:1;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;">
        <button class="btn" style="padding:10px 16px;" onclick="savePhone()">Save</button>
      </div>
      <div id="tg-msg" style="font-size:12px;margin-top:6px;"></div>
    </div>
    <button class="btn btn-ghost" style="width:100%;margin-top:1.5rem;justify-content:center;" onclick="window.location.href='/'">← Back to Home</button>
    <button class="btn btn-ghost" style="width:100%;margin-top:8px;justify-content:center;" onclick="logout()">Logout</button>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
